name: Release Build

on:
  push:
    tags:
      - 'v*' # Triggers workflow on version tags like v1.0.0

jobs:
  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Tauri/src-tauri

      - name: Make script executable
        run: chmod +x build_release.sh

      - name: Run Linux build
        run: ./build_release.sh
        
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: holad-linux-release
          path: artifacts/holad-linux-release.tar.gz

  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Tauri/src-tauri

      - name: Setup Gradle Cache
        uses: gradle/gradle-build-action@v3
        with:
          cache-read-only: false

      - name: Run Windows build
        run: .\build_release.bat

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: holad-windows-release
          path: artifacts\holad-windows-release.tar.gz

      - name: Upload Portable Exe
        uses: actions/upload-artifact@v4
        with:
          name: holad-portable-windows
          path: artifacts\Holad-Portable.exe

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: holad-android-apk
          path: artifacts\Holad-Android-Debug.apk
          
  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: holad-linux-release

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: holad-windows-release

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            holad-linux-release.tar.gz
            holad-windows-release.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
