name: Release Build

on:
  push:
    tags:
      - 'v*' # Triggers workflow on version tags like v1.0.0

env:
  NODE_OPTIONS: "--no-deprecation"
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Ensure pnpm store exists
        run: |
          mkdir -p $(pnpm store path)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Tauri/src-tauri

      - name: Make script executable
        run: chmod +x build_release.sh

      - name: Run Linux build
        run: ./build_release.sh --skip-android
        
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: holad-linux-release
          path: artifacts/holad-linux-release.tar.gz

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: holad-linux-appimage
          path: artifacts/*.AppImage
          if-no-files-found: ignore

      - name: Upload Linux Deb
        uses: actions/upload-artifact@v4
        with:
          name: holad-linux-deb
          path: artifacts/*.deb
          if-no-files-found: ignore

  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Ensure pnpm store exists
        run: |
          $store = pnpm store path
          New-Item -ItemType Directory -Force -Path $store

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: Tauri/src-tauri

      - name: Run Windows build
        run: .\build_release.bat --skip-android

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: holad-windows-release
          path: artifacts\holad-windows-release.tar.gz

      - name: Upload Portable Exe
        uses: actions/upload-artifact@v4
        with:
          name: holad-portable-windows
          path: artifacts\Holad-Portable.exe

      - name: Upload Windows Setup
        uses: actions/upload-artifact@v4
        with:
          name: holad-windows-setup
          path: artifacts\*setup.exe
          if-no-files-found: ignore

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: holad-windows-msi
          path: artifacts\*.msi
          if-no-files-found: ignore

  build-android:
    name: Build for Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Ensure pnpm store exists
        run: |
          mkdir -p $(pnpm store path)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Make script executable
        run: chmod +x build_release.sh

      - name: Run Android build
        run: ./build_release.sh --skip-tauri

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: holad-android-apk
          path: artifacts/Holad-Android-Debug.apk
  create-release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: holad-linux-release

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          pattern: holad-linux-appimage
          merge-multiple: true
        continue-on-error: true

      - name: Download Linux Deb
        uses: actions/download-artifact@v4
        with:
          pattern: holad-linux-deb
          merge-multiple: true
        continue-on-error: true

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: holad-windows-release

      - name: Download Portable Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: holad-portable-windows

      - name: Download Windows Setup
        uses: actions/download-artifact@v4
        with:
          pattern: holad-windows-setup
          merge-multiple: true
        continue-on-error: true

      - name: Download Windows MSI
        uses: actions/download-artifact@v4
        with:
          pattern: holad-windows-msi
          merge-multiple: true
        continue-on-error: true

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: holad-android-apk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            holad-linux-release.tar.gz
            holad-windows-release.tar.gz
            Holad-Portable.exe
            Holad-Android-Debug.apk
            *.exe
            *.msi
            *.AppImage
            *.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
