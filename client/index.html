<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icons/favicon_tab.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      window.addEventListener('error', (e) => {
        document.body.insertAdjacentHTML('beforeend', '<div style="position:absolute;top:0;left:0;z-index:9999;background:red;color:white;font-size:24px;">' + (e.error ? e.error.stack : e.message) + '</div>');
      });
      window.addEventListener('unhandledrejection', (e) => {
        document.body.insertAdjacentHTML('beforeend', '<div style="position:absolute;top:0;left:0;z-index:9999;background:red;color:white;font-size:24px;">' + (e.reason ? e.reason.stack : 'Reject') + '</div>');
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
